project:
  type: website
  output-dir: _site
  # Compila assets/scss/05-pages/*.scss → assets/css/pages/*.css en cada render
  pre-render: scripts/build-page-css.sh
  resources:
    - resources/cv.pdf
    - blog/sidebar.jpg
    - cursos/sidebar.jpg
    - assets/css/pages/listing.css
    - assets/css/pages/courses.css

  #post-render:
  #  - "cp -rnv static/. _site" # source: https://github.com/quarto-dev/quarto-cli/discussions/4162#discussioncomment-4831352

website:
  title: "Edison Achalma B.Sc. Econ."
  description: "Investigador y educador que aplica la ciencia de datos de forma que se dé prioridad a la equidad social."
  favicon: assets/img/favicon.png 
  # Previews Images
  image: /assets/img/default-preview.jpg  # Usada cuando ninguna página tiene su propia imagen

  # Anuncio
  #announcement:
    # Contenido obligatorio (puede incluir markdown)
    #content: "¡Bienvenidos a mi mundo! ¡Felices fiestas! Gracias por visitar 🎄"
    # Apariencia (opcional)
    #icon: gift         # Icono de Bootstrap
    #type: primary               # Color del anuncio
    #dismissable: true           # Si se puede cerrar
    #position: below-navbar      # Ubicación
    # Colores disponibles para 'type':
    # primary, secondary, success, danger, 
    # warning, info, light, dark

  # Google Analytics con opciones avanzadas
  #google-analytics:
   # tracking-id: "G-XGH6TP6RB3"  # O "UA-XXXXXXXX" para versión antigua
   # storage: cookies              # "cookies" o "none"
   # anonymize-ip: true            # true o false
    # version: 4                  # Opcional: 3 o 4 (se detecta automáticamente)

  # Cookie Consent personalizado
  #cookie-consent:
   # type: express                 # "implied" (notificación) o "express" (bloqueo hasta consentimiento)
   # style: simple                 # "simple", "headline", "interstitial", "standalone"
   # palette: light                # "light" o "dark"
   # language: es                  # Código de idioma (ej: "es", "en", "fr")
   # policy-url: https://achalmaedison.netlify.app/  # URL de tu política de privacidad
   # prefs-text: "Preferencias de Cookies"  # Texto del enlace

  # Open graph
  open-graph:
    title: "Edison Achalma B.Sc. Econ."            # Título por defecto
    description: "Investigador y educador que aplica la ciencia de datos de forma que se dé prioridad a la equidad social." # Descripción por defecto
    image: /assets/img/sidebar.jpg    # Imagen por defecto
    image-width: 1200                # Ancho de imagen recomendado
    image-height: 630                # Alto de imagen recomendado (ratio 1.91:1)
    locale: es_ES                    # Locale
    site-name: "Actus mercator"    # Nombre del sitio

  twitter-card:
    creator: "@achalmaedison"
    card-style: summary_large_image
  comments:
    utterances:
      repo: achalmed/website-achalma
      label: utterances
      theme: body-light
      issue-term: title
  site-url: https://achalmaedison.netlify.app/
  repo-url: https://github.com/achalmed/website-achalma

  navbar:
    logo: assets/img/logo_noBg.svg
    tools:
      - icon: linkedin
        href: https://www.linkedin.com/in/achalmaedison/
        text: "LinkedIn profile"
      - icon: twitter
        href: https://twitter.com/achalmaedison
        text: "Twitter"
      - icon: github
        href: https://github.com/achalmed
        text: "GitHub profile"
    right:
      - text: About
        aria-label: "About Me"
        href: about/index.qmd
      - text: Cursos
        aria-label: "Cursos y materiales docentes"
        href: cursos/index.qmd
      - text: Publications
        aria-label: "Publications"
        href: publication/index.qmd
      - text: "Blog"
        aria-label: "Meeting People Where They R"
        href: blog/index.qmd
      - text: "More"
        aria-label: "More"
        icon: ellipsis-h
        menu:
          - text: "Econometria"
            href: https://epsilon-y-beta.netlify.app/
          - text: "Filosofía"
            href: https://dialectica-y-mercado.netlify.app/
          - text: "Finanzas"
            href: https://pecunia-fluxus.netlify.app/
          - text: "Gestión empresarial"
            href: https://actus-mercator.netlify.app/
          - text: "Gestión pública"
            href: https://res-publica.netlify.app/
          - text: "Metodología de la investigación"
            href: https://methodica.netlify.app/
          - text: "Macroeconomía"
            href: https://aequilibria.netlify.app/
          - text: "Matemáticas"
            href: https://axiomata.netlify.app/
          - text: "Microeconomía"
            href: https://optimums.netlify.app/
          - text: "Programación y Software"
            href: https://numerus-scriptum.netlify.app/
          - text: "Seguridad informática"
            href: https://chaska-x.netlify.app/
          - text: "Book an appointment"
            href: appointment/index.qmd

  page-footer:
    left: >-
      &#169; 2026 Edison Achalma &#8729; Made with [Quarto](https://quarto.org)
    center: |
      <a class="link-dark me-1" href="/accessibility.html" title="Accessibility commitment" target="_blank" rel="noopener">{{< fa universal-access >}}</a>
      <a class="link-dark me-1" href="https://fosstodon.org/@achalmaedison" title="mastodon" target="_blank" rel="noopener">{{< fa brands mastodon >}}</a>
      <a class="link-dark me-1" href="https://github.com/achalmed" title="github" target="_blank" rel="noopener">{{< fa brands github >}}</a>
      <a class="link-dark me-1" href="https://linkedin.com/in/achalmaedison" title="LinkedIn" target="_blank" rel="noopener">{{< fa brands linkedin >}}</a>

    right:
      - text: "Accessibility"
        aria-label: "Accessibility Commitment"
        href: accessibility.qmd
      - text: "Contact"
        aria-label: "Contact Form"
        href: "contact.qmd"
      - text: "License"
        aria-label: "License Details"
        href: license.qmd
      - icon: rss
        href: index.xml
        #href: https://achalmaedison.netlify.app/blog/index.xml

# bibliography: references.bib
lang: es

format:
  html:
    # Design System: assets/scss/ (guía en assets/scss/README.md)
    theme:
      light:
        - cosmo
        - assets/scss/theme-light.scss
      dark:
        - cosmo
        - assets/scss/theme-dark.scss
    css:
      - assets/css/global.css
      - assets/css/components/bibbase.css
    # Google Tag Manager
    include-in-header: assets/gtm-head.html
    include-after-body:
      - assets/gtm-body.html
      - assets/interactions.html
    highlight-style: a11y
    code-link: true
    pagetitle: "{{< meta title >}}"
    lightbox:
      match: auto
      effect: fade
      desc-position: right
      loop: false
    
