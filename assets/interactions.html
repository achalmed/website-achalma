<!-- ==========================================================================
  MICROINTERACCIONES — "QUIET LABORATORY"
  ~1 KB de JS sin dependencias. Tres responsabilidades:
    1. Navbar: clase .lab-scrolled al hacer scroll (transparencia → sólido).
    2. Iluminación sutil que sigue el cursor (solo pointer:fine, sin
       reduced-motion): actualiza --lab-mx / --lab-my que consumen los temas.
    3. Aparición escalonada de tarjetas/filas de listados con
       IntersectionObserver (clases .lab-reveal / .lab-in de los temas).
  Si JS no se ejecuta, el sitio queda íntegro: nada se oculta por defecto.
=========================================================================== -->
<script>
  (function () {
    "use strict";
    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* 1 ─ Navbar con estado de scroll */
    var nav = document.querySelector(".navbar");
    if (nav) {
      var onScroll = function () {
        nav.classList.toggle("lab-scrolled", window.scrollY > 20);
      };
      onScroll();
      window.addEventListener("scroll", onScroll, { passive: true });
    }

    /* 2 ─ Iluminación que sigue el cursor */
    if (!reduce && window.matchMedia("(pointer: fine)").matches) {
      var pending = false;
      document.addEventListener(
        "mousemove",
        function (e) {
          if (pending) return;
          pending = true;
          var x = e.clientX, y = e.clientY;
          requestAnimationFrame(function () {
            document.body.style.setProperty("--lab-mx", x + "px");
            document.body.style.setProperty("--lab-my", y + "px");
            document.body.classList.add("lab-glow-on");
            pending = false;
          });
        },
        { passive: true }
      );
      document.documentElement.addEventListener("mouseleave", function () {
        document.body.classList.remove("lab-glow-on");
      });
    }

    /* 3 ─ Hero de portada: ajuste exacto al alto visible (sin scroll inicial) */
    var hero = document.querySelector(".quarto-about-solana");
    if (hero) {
      var footer = document.querySelector(".nav-footer");
      var fitHero = function () {
        hero.style.minHeight = "";
        var top = hero.getBoundingClientRect().top + window.scrollY;
        var free = window.innerHeight - top - (footer ? footer.offsetHeight : 0);
        hero.style.minHeight = Math.max(free, 420) + "px";
        /* segunda pasada: compensa márgenes y gaps del grid que quedan
           entre el hero y el footer, midiendo el desbordamiento real */
        var overflow = document.documentElement.scrollHeight - window.innerHeight;
        if (overflow > 0) {
          hero.style.minHeight = Math.max(free - overflow, 420) + "px";
        }
      };
      fitHero();
      /* re-ajustar cuando cargan las imágenes (cambian la altura del hero) */
      window.addEventListener("load", fitHero);
      window.addEventListener("resize", fitHero, { passive: true });
    }

    /* 4 ─ Aparición suave de listados y secciones narrativas (.lab-section) */
    if (!reduce && "IntersectionObserver" in window) {
      var items = document.querySelectorAll(
        ".quarto-listing .quarto-post, .quarto-listing .card, .quarto-grid-item, .lab-section"
      );
      if (items.length) {
        var io = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add("lab-in");
                io.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.06, rootMargin: "0px 0px -5% 0px" }
        );
        items.forEach(function (el, i) {
          el.classList.add("lab-reveal");
          el.style.transitionDelay = (i % 4) * 60 + "ms";
          io.observe(el);
        });
      }
    }
  })();
</script>
