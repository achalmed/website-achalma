<!-- ==========================================================================
  MICROINTERACCIONES — "QUIET LABORATORY" (cargador de módulos)
  ===========================================================================
  Inyectado en todas las páginas vía include-after-body (_quarto.yml).
  El código vive en módulos independientes en assets/js/ (ver su README):

    · navbar.js         → clase .lab-scrolled al hacer scroll
    · cursor.js         → iluminación que sigue el puntero (--lab-mx/--lab-my)
    · hero.js           → ajuste del hero de portada al alto visible
    · scroll-effects.js → aparición escalonada (.lab-reveal/.lab-in)

  Rutas absolutas (/assets/js/...) para funcionar a cualquier profundidad.
  Sin JS el sitio queda íntegro: nada se oculta por defecto.
=========================================================================== -->
<script src="/assets/js/navbar.js"></script>
<script src="/assets/js/cursor.js"></script>
<script src="/assets/js/hero.js"></script>
<script src="/assets/js/scroll-effects.js"></script>
