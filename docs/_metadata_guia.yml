# ========================================================================
# METADATOS DEL DOCUMENTO
# ========================================================================

date-modified: "today"  # Fecha de modificación del documento (opciones: "today", "last-modified", fecha específica)
license: "CC BY-SA"  # Licencia del documento (habilita apéndice de licencia CC)
lang: es  # Idioma del documento (es, en, fr, de, etc.)
search: true  # Habilitar funcionalidad de búsqueda en el documento
lightbox: true  # Habilitar lightbox para imágenes (clic para ampliar)

# ========================================================================
# CONFIGURACIÓN DEL BLOQUE DE TÍTULO
# ========================================================================

title-block-banner: true  # Habilitar banner en el bloque de título
# title-block-banner: "#EDF3F9"  # Opción 1: Color hexadecimal para el banner
# title-block-banner: images/philosophy2.jpg  # Opción 2: Imagen de fondo para el banner
# title-block-banner-color: body  # Color del texto en el banner (body, white, black, hex color)
is-particlejs-enabled: true  # Habilitar animación Particle.js en formato HTML

# ========================================================================
# INFORMACIÓN DEL AUTOR
# ========================================================================

author:
  - name: Edison Achalma  # Nombre completo del autor
    url: https://achalmaedison.netlify.app  # Sitio web personal del autor
    affiliation:
      - id: unsch  # Identificador único de la afiliación
        name: Universidad Nacional de San Cristóbal de Huamanga  # Nombre de la institución
        department: Escuela Profesional de Economía  # Departamento o facultad
        # address: Portal Independencia N 57  # Dirección física (opcional)
        city: Ayacucho  # Ciudad
        region: AYA  # Región o estado
        country: Perú  # País
        postal-code: ~  # Código postal (~ indica valor nulo)
    affiliation-url: https://www.gob.pe/unsch  # URL oficial de la institución
    orcid: 0000-0001-6996-3364  # ORCID iD del autor (identificador único de investigador)
    email: elmer.achalma.09@unsch.edu.pe  # Correo electrónico de contacto
    attributes:
      corresponding: true  # Indica si es el autor de correspondencia
      equal-contributor: true  # Indica contribución equitativa entre autores
      deceased: false  # Indica si el autor ha fallecido
    # Roles según la taxonomía CRediT (Contributor Roles Taxonomy)
    # URL: https://credit.niso.org/
    # Opciones disponibles: conceptualización, curación de datos, análisis formal,
    # adquisición de financiación, investigación, metodología, administración de proyectos,
    # recursos, software, supervisión, validación, visualización, redacción, edición
    roles:
      - conceptualización  # Desarrollo de ideas y objetivos de investigación
      - redacción  # Escritura del manuscrito original

# ========================================================================
# NOTA DEL AUTOR
# ========================================================================

author-note:
  status-changes:
    # Ejemplo: Edison Achalma está ahora en Universidad de Lima.
    affiliation-change: ~  # Cambios de afiliación institucional
    # Ejemplo: Edison Achalma ha fallecido.
    deceased: ~  # Indicar fallecimiento del autor
  
  # Las divulgaciones se condensan en un párrafo. Para separar divulgaciones,
  # inicie un campo con dos saltos de línea: \n\nNueva divulgación
  disclosures:
    # Ejemplo: Este estudio se registró en ClinicalTrials.gov (Identificador NCT12345678).
    study-registration: ~  # Registro del estudio en repositorios oficiales
    
    # Ejemplo: Los datos están disponibles en Open Science Framework (DOI: 10.17605/OSF.IO/XXXXX)
    data-sharing: ~  # Reconocimiento y citación de datos/materiales compartidos
    
    # Ejemplo: Este artículo se basa en datos publicados en [Referencia completa].
    # Ejemplo: Este artículo se basa en la disertación doctoral de Edison Achalma [cita].
    related-report: ~  # Relación con otros informes, tesis o publicaciones
    
    # Ejemplo: Edison Achalma ha sido consultor remunerado de la Corporación X, 
    # que ha financiado parcialmente este estudio.
    conflict-of-interest: Los autores no tienen conflictos de intereses que revelar.
    
    # Ejemplo: Este estudio contó con el apoyo de la subvención N° 2024-001 
    # del Fondo Nacional de Desarrollo Científico y Tecnológico (FONDECYT).
    financial-support: ~  # Fuentes de financiamiento del estudio
    
    # Ejemplo: Los autores agradecen a la Dra. María García por sus valiosos 
    # comentarios en versiones preliminares de este manuscrito.
    gratitude: ~  # Agradecimientos a colaboradores no autores
    
    # Ejemplo: Dado que los autores contribuyen por igual, el orden de autoría 
    # se determinó alfabéticamente / mediante sorteo aleatorio.
    authorship-agreements: ~  # Acuerdos sobre orden de autoría

# ========================================================================
# CONFIGURACIÓN DE TABLA DE CONTENIDOS
# ========================================================================

toc: true  # Mostrar tabla de contenidos (true/false)
toc-title: " "  # Título de la tabla de contenidos (cadena vacía para sin título)
toc-location: left  # Ubicación de la tabla de contenidos (opciones: left, body, right)

# ========================================================================
# CONFIGURACIÓN DE ELEMENTOS FLOTANTES
# ========================================================================

# Permite que los flotantes (figuras, tablas, etc.) se muevan dentro del texto
# Nota: floatsintext no se aplica cuando la salida .pdf está en modo journal (jou)
floatsintext: true  # true: elementos cerca del texto de referencia, false: al final de secciones

# ========================================================================
# CONFIGURACIÓN DE REFERENCIAS Y CITAS
# ========================================================================

citation: true  # Habilitar funcionalidad de citación
google-scholar: true  # Habilitar enlaces a Google Scholar para búsqueda de artículos
# csl: apa-6th-edition.csl  # Archivo de estilo de citas personalizado (Citation Style Language)
# cite-method: biblatex  # Método de citación (citeproc, natbib, biblatex)
                         # IMPORTANTE: apaquarto trabaja con citeproc por defecto
link-citations: true  # Convertir citas en enlaces clicables a la bibliografía
appendix-cite-as: display  # Cómo citar apéndices (display, appendix)
citation-last-author-separator: "y"  # Separador antes del último autor ("and", "y", "&")
citation-masked-author: "Cita Enmascarada"  # Texto para autores enmascarados en modo mask
citation-masked-title: "Título Enmascarado"  # Texto para títulos enmascarados en modo mask
citation-masked-date: "n.f."  # Texto para fechas enmascaradas (n.f. = no fecha)

# Textos de bloques personalizados
title-block-author-note: "Nota de Autores"  # Encabezado para la nota de autores
title-block-correspondence-note: "La correspondencia relativa a este artículo debe dirigirse a"
title-block-role-introduction: "Los roles de autor se clasificaron utilizando la taxonomía de roles de colaborador (CRediT; https://credit.niso.org/) de la siguiente manera:"
references-meta-analysis: "Las referencias marcadas con un asterisco indican estudios incluidos en el metanálisis."

# ========================================================================
# CONFIGURACIÓN DE REFERENCIAS CRUZADAS
# ========================================================================

language:
  crossref-fig-title: Figura  # Prefijo para referencias a figuras (default: "Figure")
  crossref-tbl-title: Tabla  # Prefijo para referencias a tablas (default: "Table")
  crossref-lst-title: "Listing"  # Prefijo para listados de código
  crossref-thm-title: "Teorema"  # Prefijo para teoremas matemáticos
  crossref-lem-title: "Lema"  # Prefijo para lemas matemáticos
  crossref-cor-title: "Corolario"  # Prefijo para corolarios
  crossref-prp-title: "Proposición"  # Prefijo para proposiciones
  crossref-cnj-title: "Conjetura"  # Prefijo para conjeturas
  crossref-def-title: "Definición"  # Prefijo para definiciones
  crossref-exm-title: "Ejemplo"  # Prefijo para ejemplos
  crossref-exr-title: "Ejercicio"  # Prefijo para ejercicios
  crossref-ch-prefix: "Capítulo"  # Prefijo para capítulos
  crossref-apx-prefix: Anexo  # Prefijo para apéndices (default: "Appendix")
  crossref-sec-prefix: "Sección"  # Prefijo para secciones
  crossref-eq-prefix: Ecuación  # Prefijo para ecuaciones (default: "Equation")
  crossref-lof-title: "Lista de Figuras"  # Título para lista de figuras
  crossref-lot-title: "Lista de Tablas"  # Título para lista de tablas
  crossref-lol-title: "Lista de Listings"  # Título para lista de código

# ========================================================================
# CONFIGURACIÓN DE VISIBILIDAD Y BORRADOR
# ========================================================================

mask: false  # Ocultar información sensible (autores, afiliaciones) para revisión ciega
draft: true  # Modo de borrador: true = borrador con marca de agua, false = versión final
draftfirst: false  # Marca de agua "BORRADOR" solo en la primera página
draftall: false  # Marca de agua "BORRADOR" en todas las páginas

# ========================================================================
# FORMATOS DE SALIDA
# ========================================================================

format:
  
  # ----------------------------------------------------------------------
  # FORMATO HTML
  # ----------------------------------------------------------------------
  html:
    # page-layout: article  # Diseño de página (article, full, custom)
    # mainfont: Times, Times New Roman, serif  # Fuente principal del documento
    
    # Tabla de Contenidos
    toc-depth: 1  # Profundidad de niveles en la tabla de contenidos (1-6)
    toc-expand: 3  # Nivel de anidamiento inicial expandido en la tabla de contenidos
    
    # Comportamiento de Navegación
    smooth-scroll: true  # Desplazamiento suave al hacer clic en enlaces internos
    link-external-newwindow: true  # Abrir enlaces externos en nueva ventana/pestaña
    
    # Interactividad de Referencias
    citations-hover: true  # Mostrar vista previa de citas al pasar el cursor
    footnotes-hover: true  # Mostrar notas al pie en popup al pasar el cursor
    
    # Estilo de Código
    # code-block-background: true  # Fondo de color para bloques de código
    # code-block-border-left: "#31BAE9"  # Color del borde izquierdo de bloques de código
    highlight-style: github  # Tema de resaltado de sintaxis
                             # Opciones: github, monokai, espresso, zenburn, kate, 
                             # monochrome, breezedark, haddock, arrow, atom-one, etc.
    
    # Funcionalidad de Código
    code-copy: true  # Botón para copiar código (hover, true, false)
    code-fold: true  # Permitir plegar/desplegar código (false, true, show)
    code-summary: "Mostrar el código"  # Texto del botón de plegar/desplegar código
    code-overflow: scroll  # Manejo de desbordamiento de código (scroll, wrap)
    code-line-numbers: true  # Mostrar números de línea en bloques de código
    
    # Herramientas de Código
    code-tools:
      source: repo  # Enlace al código fuente (repo, none, URL)
      toggle: false  # Botón para mostrar/ocultar todo el código
      caption: none  # Leyenda para herramientas de código
    
    # Diagramas Mermaid
    mermaid:
      theme: neutral  # Tema para diagramas Mermaid (default, forest, dark, neutral)
    
    # Configuración de Grid Layout (diseño de cuadrícula)
    # grid:
      # sidebar-width: 400px  # Ancho de la barra lateral
      # body-width: 800px  # Ancho del cuerpo principal
      # margin-width: 250px  # Ancho de los márgenes
      # gutter-width: 5rem  # Espacio entre columnas
    
    # Ubicación de Elementos
    # reference-location: margin  # Ubicación de referencias (document, section, block, margin)
    citation-location: document  # Ubicación de citas (document, margin)
    
    # Opciones de Exportación
    self-contained: true  # Generar archivo HTML único con recursos incrustados
    
    # Plantillas Personalizadas
    template-partials:
      - ../_partials/title-block-link-buttons/title-block.html  # Parcial personalizado
    
    # Tema Visual
    theme: litera  # Tema de Bootstrap (cosmo, flatly, litera, lumen, minty, pulse, etc.)
    
    # Enlaces Adicionales
    other-links:
      - text: Gravatar  # Texto del enlace
        href: https://gravatar.com/achalmaedison  # URL del enlace
    
    # Enlaces a Código
    # code-links:
      # - text: Data Import Code  # Descripción del código
        # icon: file-code  # Icono de Bootstrap
        # href: data-import.py  # Archivo de código
    
    format-links: true  # Enlaces automáticos a otros formatos (pdf, docx, html, epub)

  # ----------------------------------------------------------------------
  # FORMATO PDF (APA QUARTO)
  # ----------------------------------------------------------------------
  apaquarto-pdf:
    # Modo de Documento
    documentmode: jou  # Modo de documento APA
    # Opciones disponibles:
    # - jou (journal): Formato de revista de dos columnas, estilo publicación
    # - man (manuscript): Formato manuscrito, similar a .docx, para envío
    # - doc (document): Formato documento estándar, similar a artículo LaTeX
    # - stu (student): Formato para trabajos de estudiantes
    
    # Configuración específica para modo ESTUDIANTE (stu)
    # course: Introduction to Statistics (EDUC 5101)  # Nombre del curso
    # professor: W. Joel Schneider  # Nombre del profesor
    # duedate: 12/22/2024  # Fecha de entrega
    
    # Configuración específica para modo REVISTA (jou)
    # journal: Psychological Review  # Nombre de la revista
    # volume: 2024, Vol. 131, No. 2, 10--60  # Información de volumen y páginas
    
    # Información de Copyright
    copyrightnotice: 2025  # Año de copyright
    copyrightext: Todos los derechos reservados  # Texto de copyright
    
    # Elementos del Documento
    toc: true  # Incluir tabla de contenidos
    list-of-figures: true  # Incluir lista de figuras
    list-of-tables: true  # Incluir lista de tablas
    
    # Configuración de Página
    # papersize: "us-letter"  # Tamaño de papel (us-letter, a4)
    keep-tex: true  # Mantener archivo .tex intermedio (útil para depuración)
    fontsize: 12pt  # Tamaño de fuente (10pt, 11pt, 12pt)
    a4paper: true  # Usar tamaño de papel A4 (true/false)
    
    # Numeración
    numbered-lines: false  # Numerar líneas del documento (útil para revisión)
    number-sections: true  # Numerar secciones del documento
    # number-depth: 3  # Profundidad de numeración de secciones (1-6)
                       # Para secciones sin numerar, usar: ### Título {.unnumbered}
    
    # Estilo Visual
    colorlinks: true  # Enlaces en color (más atractivo visualmente)
    
    # Configuración de Fuentes (tipografías)
    # mainfont: "Latin Modern Roman"  # Fuente del cuerpo principal
                                      # Alternativas: "Times New Roman", "Arial"
    # sansfont: "Latin Modern Sans"  # Fuente para encabezados sin serif
    # monofont: "Latin Modern Mono"  # Fuente monoespaciada para código
    # mathfont: "Latin Modern Math"  # Fuente para ecuaciones matemáticas
    
    # Motor de Compilación PDF
    pdf-engine: xelatex  # Motor de PDF (pdflatex, xelatex, lualatex)
                         # Recomendado: xelatex (mejor soporte Unicode y fuentes)
    keep-md: false

  # ----------------------------------------------------------------------
  # FORMATO DOCX (APA QUARTO)
  # ----------------------------------------------------------------------
  apaquarto-docx:
    toc: true  # Incluir tabla de contenidos
    fontsize: 12pt  # Tamaño de fuente (10pt, 11pt, 12pt)
    a4paper: true  # Usar tamaño de papel A4
    numbered-lines: false  # Numerar líneas del documento
    number-sections: true  # Numerar secciones del documento
    # number-depth: 5  # Profundidad de numeración de secciones
    keep-md: false

# ========================================================================
# CONFIGURACIÓN DEL ENTORNO DE EJECUCIÓN
# ========================================================================

jupyter: python3  # Kernel de Jupyter para ejecutar código (python3, ir, julia, etc.)

# ========================================================================
# CONFIGURACIÓN DEL EDITOR
# ========================================================================

editor:
  # Modo preferido (source o visual)
  mode: source
  
  # Configuración de Markdown
  markdown:
    canonical: true      # Formato consistente. Usar formato Markdown canónico (mejor para control de versiones)
    wrap: 72            # 72 caracteres por línea
    references:
      location: section # Notas al pie por sección
    
    # Opciones de escritura
    auto-wrapping: true
    sentence-spacing: true

# ========================================================================
# CONFIGURACIÓN DE COMENTARIOS
# ========================================================================

comments:
  utterances:  # Sistema de comentarios basado en GitHub Issues
    repo: achalmed/website-achalma  # Repositorio de GitHub (formato: usuario/repo)
    issue-term: title  # Mapeo de páginas a issues (title, pathname, url, og:title)
    theme: boxy-light  # Tema visual (github-light, github-dark, boxy-light, etc.)
    label: "comments :crystal_ball:"  # Etiqueta para los issues de comentarios

# ========================================================================
# CONFIGURACIÓN DE EJECUCIÓN
# ========================================================================

execute:
  freeze: true  # true: Nunca re-ejecutar durante el renderizado del proyecto. auto: Re-ejecutar solo cuando cambia el código fuente (fuciona solo si .qmd que tienen Python/R)
  keep-md: true  # Mantener archivos .md generados
  keep-ipynb: true 
  echo: true  # Mostrar comandos ejecutados
  output: true  # Mostrar resultados de la ejecución
  warning: false  # Ocultar advertencias
  error: false  # Ocultar errores
  enabled: false  # Habilitar la ejecución: quarto render notebook.ipynb --execute
  cache: true  # PARA RESULTADOS DE CALCULO: quarto render index.qmd --cache-refresh #singledoc quarto render --cache-refresh #entireproject